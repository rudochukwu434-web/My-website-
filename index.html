<!DOCTYPE html>
<html>
<head>
  <title>Sweet Coin APK Store</title>

  <style>

    body{
      margin:0;
      font-family:Arial;
      background:#121212;
      color:white;
    }

    header{
      background:#00b894;
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    header h1{
      margin:0;
    }

    .search-box input{
      padding:10px;
      width:250px;
      border:none;
      border-radius:20px;
    }

    .slider{
      width:95%;
      margin:20px auto;
      overflow:hidden;
      border-radius:15px;
    }

    .slides img{
      width:100%;
      border-radius:15px;
      height:300px;
      object-fit:cover;
    }

    .categories{
      display:flex;
      gap:15px;
      overflow:auto;
      padding:10px 20px;
    }

    .cat{
      background:#1f1f1f;
      padding:10px 20px;
      border-radius:20px;
      white-space:nowrap;
    }

    .container{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      padding:20px;
    }

    .card{
      background:#1e1e1e;
      border-radius:15px;
      overflow:hidden;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.03);
    }

    .card img{
      width:100%;
      height:180px;
      object-fit:cover;
    }

    .content{
      padding:15px;
    }

    .btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#00b894;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    .btn:hover{
      background:#019875;
    }

    footer{
      background:#000;
      text-align:center;
      padding:20px;
      margin-top:20px;
    }

  </style>
</head>

<body>

<header>

  <h1>Sweet Coin APK</h1>

  <div class="search-box">
    <input type="text" placeholder="Search apps & games">
  </div>

</header>

<div class="slider">

  <div class="slides">
    <img src="https://via.placeholder.com/900x300">
  </div>

  <div class="slides">
    <img src="https://via.placeholder.com/900x300">
  </div>

  <div class="slides">
    <img src="https://via.placeholder.com/900x300">
  </div>

</div>

<div class="categories">

  <div class="cat">Action</div>
  <div class="cat">Football</div>
  <div class="cat">Racing</div>
  <div class="cat">Editing</div>
  <div class="cat">Tech Apps</div>

</div>

<div class="container">

  <div class="card">

    <img src="https://via.placeholder.com/300x200">

    <div class="content">

      <h2>Free Fire</h2>

      <p>Battle royale action game.</p>

      <a href="https://play.google.com">
        <button class="btn">
          Download APK
        </button>
      </a>

    </div>

  </div>

  <div class="card">

    <img src="https://via.placeholder.com/300x200">

    <div class="content">

      <h2>eFootball</h2>

      <p>Real football mobile game.</p>

      <a href="https://play.google.com">
        <button class="btn">
          Install Now
        </button>
      </a>

    </div>

  </div>

  <div class="card">

    <img src="https://via.placeholder.com/300x200">

    <div class="content">

      <h2>Canva</h2>

      <p>Create graphics and designs.</p>

      <a href="https://play.google.com">
        <button class="btn">
          Get App
        </button>
      </a>

    </div>

  </div>

</div>

<footer>
  © 2026 Sweet Coin APK Store
</footer>

<script>

let slideIndex = 0;
showSlides();

function showSlides() {

  let slides =
  document.getElementsByClassName("slides");

  for(let i = 0; i < slides.length; i++){
    slides[i].style.display = "none";
  }

  slideIndex++;

  if(slideIndex > slides.length){
    slideIndex = 1;
  }

  slides[slideIndex-1].style.display = "block";

  setTimeout(showSlides, 3000);
}

</script>

</body>
</html>
