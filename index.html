<!DOCTYPE html>
<html>
<head>
  <title>Sweet Coin Fashion</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>Sweet Coin Fashion</h1>
    <p>Modern Streetwear & Clothing Designs</p>

    <a href="#shop" class="btn">Shop Now</a>
  </header>

  <!-- PROFILE -->
  <section class="profile">
    <img src="myphoto.jpg" alt="Profile">
    <h2>Raphael Udochukwu</h2>
    <p>Fashion Designer</p>
  </section>

  <!-- SHOP SECTION -->
  <section id="shop" class="shop">

    <h2>Our Collection</h2>

    <div class="product">
      <img src="tshirt.jpg" alt="T-shirt">
      <h3>T-shirt</h3>
      <p>$10</p>
      <button>Buy Now</button>
    </div>

  </section>

</body>
</html>
