<!DOCTYPE html>
<html>
<head><head>
  <title>My Shop</title>

  <link rel="stylesheet" href="style.css">
</head>
  <title>Clothing Designs</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    /* Header */
    .header {
      background-color: black;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    /* Hero Section */
    .hero {
      text-align: center;
      padding: 60px 20px;
      background-color: white;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      color: gray;
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 25px;
      background-color: green;
      color: white;
      text-decoration: none;
      border-radius: 8px;
    }

    /* Products */
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 40px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .price {
      color: green;
      font-weight: bold;
    }

    /* Footer */
    .footer {
      background-color: black;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>

<body><a href="shop.html">
  <button>Shop Now</button>
</a>
<div id="shop">
  <h2>My Products</h2>
</div>
  <div class="header">
    Clothing Designs
  </div>

  <div class="hero">
    <h1>Welcome to My Fashion Store</h1>
    <p>Trendy clothes made for your style</p>
    <a class="btn" href="https://rudochukwu434-web.github.io/My--website-1">Shop Now</a>
  </div>

  <div class="products">

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>T-Shirt</h3>
      <p class="price">$10</p>
    </div><div class="profile">
  <img src="myphoto.jpg" alt="My Profile">
  <h2>Raphael Udochukwu</h2>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Hoodie</h3>
      <p class="price">$25</p>
    </div>

    <div class="card">
      <img src="https://via.placeholder.com/200">
      <h3>Jeans</h3>
      <p class="price">$30</p>
    </div>

  </div>

  <div class="footer">
    © 2026 Clothing Designs
  </div>

</body>
</html>
