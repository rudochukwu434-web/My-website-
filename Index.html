<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background-color: #f4f4f4;
            text-align: center;
        }

        .header {
            background-color: #333;
            color: white;
            padding: 30px;
        }

        h1 {
            margin: 0;
        }

        .section {
            padding: 20px;
        }

        .card {
            background: white;
            margin: 20px auto;
            padding: 20px;
            width: 80%;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background-color: darkblue;
        }
    </style>

</head>
<body>

    <div class="header">
        <h1>Your Name</h1>
        <p>Web Developer</p>
    </div>

    <div class="section">

        <div class="card">
            <h2>About Me</h2>
            <p>I am learning web development and building my skills step by step.</p>
        </div>

        <div class="card">
            <h2>My Skills</h2>
            <p>HTML, CSS, JavaScript</p>
        </div>

        <div class="card">
            <h2>Contact Me</h2>
            <button onclick="alert('Thanks for contacting me!')">
                Message Me
            </button>
        </div>

    </div>

</body>
</html>
